<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <!-- ✅ 關鍵：允許撐滿 + 避開瀏海 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <meta http-equiv="Content-Security-Policy" content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: blob:">
  <title>Rusted Survival 鏽跡餘生</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      color: #fff;
      font-family: sans-serif;

      /* ✅ 一開始允許滾動（讓 Safari 能收網址列） */
      overflow-y: auto;

      /* ✅ 強制可滾（關鍵） */
      height: 200vh;

      /* 防止奇怪彈性滑動 */
      overscroll-behavior: none;
    }

    :root, body.is-fullscreen {
      background-color: #000;
    }

    #app, #loading, #error, #launch {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #000;
      user-select: none;
    }

    #launch {
      background: rgba(0,0,0,0.7);
      cursor: pointer;
    }

    .green-flag {
      width: 80px;
      height: 80px;
      padding: 16px;
      border-radius: 50%;
      background: rgba(255,255,255,0.75);
      border: 3px solid white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .progress-bar-outer {
      border: 1px solid currentColor;
      height: 10px;
      width: 200px;
    }

    .progress-bar-inner {
      height: 100%;
      width: 0;
      background-color: currentColor;
    }
  </style>

  <meta name="theme-color" content="#000000">
</head>

<body>

<div id="app"></div>

<div id="launch" class="screen" hidden>
  <div class="green-flag">▶</div>
</div>

<div id="loading" class="screen">
  <div class="progress-bar-outer">
    <div class="progress-bar-inner" id="loading-inner"></div>
  </div>
</div>

<div id="error" class="screen" hidden>
  <h1>Error</h1>
  <pre id="error-stack"></pre>
</div>

<script src="script.js"></script>

<script>
const appElement = document.getElementById('app');
const launchScreen = document.getElementById('launch');
const loadingScreen = document.getElementById('loading');
const loadingInner = document.getElementById('loading-inner');
const errorScreen = document.getElementById('error');
const errorStack = document.getElementById('error-stack');

const setProgress = (p) => {
  loadingInner.style.width = (p * 100) + "%";
};

const handleError = (e) => {
  console.error(e);
  errorScreen.hidden = false;
  errorStack.textContent = e.stack || e;
};

try {
  setProgress(0.1);

  const scaffolding = new Scaffolding.Scaffolding();
  scaffolding.width = 480;
  scaffolding.height = 360;
  scaffolding.resizeMode = "preserve-ratio";
  scaffolding.setup();
  scaffolding.appendTo(appElement);

  window.scaffolding = scaffolding;

} catch (e) {
  handleError(e);
}

/* =========================
   📦 載入專案
========================= */
const getProjectData = async () => {
  const res = await fetch("./assets/project.json");
  return await res.arrayBuffer();
};

/* =========================
   🚀 執行
========================= */
const run = async () => {
  const data = await getProjectData();
  await scaffolding.loadProject(data);

  setProgress(1);
  loadingScreen.hidden = true;
  launchScreen.hidden = false;

  launchScreen.addEventListener('click', () => {
    launchScreen.hidden = true;

    /* 🔥 關鍵：觸發 Safari 收網址列 */
    window.scrollTo(0, 1);

    /* 🔒 再鎖畫面（避免亂滑） */
    setTimeout(() => {
      document.body.style.overflow = "hidden";
      document.body.style.height = "100vh";
    }, 300);

    scaffolding.start();
  });
};

run().catch(handleError);
</script>

</body>
</html>
